<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghar Seva — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/toast.css') }}">
</head>
<body>

    <div class="bg-blob blob1"></div>
    <div class="bg-blob blob2"></div>
    <div class="bg-blob blob3"></div>

    <div class="login-card">

        <h2 class="card-title">Welcome Back 👋</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
        <div id="flask-messages" data-messages="{{ messages | tojson }}"></div>
        {% endwith %}

        <!-- Google Login Button -->
        <a href="{{ url_for('google_login', role='user') }}" class="google-btn">
            <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span>Continue with Google</span>
        </a>

        <div class="divider">
            <span>or login with email</span>
        </div>

        <form class="login-form" id="loginForm" method="POST" action="{{ url_for('login') }}" novalidate>

            <div class="field-group">
                <label class="field-label" for="email">Email Address</label>
                <div class="input-wrapper">
                    <span class="input-icon">📧</span>
                    <input type="email" id="email" name="email" class="field-input" placeholder="you@example.com" autocomplete="email" required>
                </div>
                <span class="field-error" id="emailError"></span>
            </div>

            <div class="field-group">
                <label class="field-label" for="password">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" name="password" class="field-input" placeholder="Enter your password" autocomplete="current-password" required>
                    <button type="button" class="toggle-password" id="togglePassword" aria-label="Show/hide password">
                        <span id="eyeIcon">👁️</span>
                    </button>
                </div>
                <span class="field-error" id="passwordError"></span>
            </div>

            <div class="bottom-row">
                <label class="checkbox-label">
                    <input type="checkbox" id="rememberMe" name="remember_me" class="checkbox-input">
                    <span class="checkbox-custom"></span>
                    Remember me
                </label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <span class="btn-text">Log In</span>
                <span class="btn-loader" id="btnLoader"></span>
            </button>

        </form>

        <div class="card-footer">
            <p class="signup-prompt">
                Don't have an account? <a href="{{ url_for('signup') }}" class="signup-link">Sign Up</a>
            </p>
            <a href="{{ url_for('index') }}" class="back-home">← Back to Home</a>
        </div>

    </div>

    <script src="{{ url_for('static', filename='js/toast.js') }}"></script>
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
